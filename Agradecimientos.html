<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias por Votar - UMBRA | Franco Rodríguez</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Orbitron para títulos de videojuegos, Inter para lectura general -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@600;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gameDark: '#0b0c10',
                        gameDarker: '#050608',
                        gamePurple: '#4c1d95',
                        gameAccent: '#0ea0ea'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        orbitron: ['Orbitron', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glow-cyan {
            filter: drop-shadow(0 0 15px rgba(14, 160, 234, 0.6));
        }
        .glow-red {
            filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.7));
        }
        .glow-magenta {
            filter: drop-shadow(0 0 15px rgba(217, 70, 239, 0.6));
        }
        .purple-gradient {
            background: linear-gradient(135deg, #1e0b36 0%, #3b0764 50%, #1e0b36 100%);
        }
    </style>
</head>
<body class="bg-gameDarker text-slate-100 min-h-screen flex flex-col justify-between overflow-x-hidden selection:bg-purple-600 selection:text-white">

    <!-- CABECERA PRINCIPAL (IDÉNTICA AL ORIGINAL) -->
    <header class="bg-gameDark border-b border-slate-900/50 py-6 text-center select-none relative z-10">
        <div class="max-w-7xl mx-auto px-4 flex flex-col items-center">
            
            <!-- Logotipo de la Máscara / Icono Superior -->
            <div class="mb-4 text-white hover:scale-110 transition-transform duration-300">
                <svg class="w-12 h-12" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Cuernos de la máscara -->
                    <path d="M25 15 L35 30 L28 45 L15 35 Z" fill="white" />
                    <path d="M75 15 L65 30 L72 45 L85 35 Z" fill="white" />
                    <!-- Ojos y rostro de la máscara -->
                    <path d="M50 85 L30 50 L35 40 L50 48 L65 40 L70 50 Z" fill="white" />
                    <!-- Agujeros de los ojos oscuros -->
                    <polygon points="38,48 44,52 45,46" fill="#0b0c10" />
                    <polygon points="62,48 56,52 55,46" fill="#0b0c10" />
                    <circle cx="50" cy="65" r="3" fill="#0b0c10" />
                </svg>
            </div>

            <!-- Título: Gracias por Votar -->
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold tracking-wider font-orbitron text-white mb-2 uppercase">
                Gracias por Votar
            </h1>
            
            <!-- Nombre del Juego: UMBRA -->
            <h2 class="text-5xl sm:text-6xl md:text-7xl font-black tracking-widest font-orbitron text-white">
                UMBRA
            </h2>
            
            <!-- Subtítulo del Juego -->
            <p class="text-xs sm:text-sm font-semibold tracking-[0.2em] uppercase text-slate-400 mt-1 font-orbitron">
                Grimorium of Morpheus
            </p>
        </div>
    </header>

    <!-- CUERPO CENTRAL: BANNER E ILUSTRACIÓN DEL JUEGO -->
    <main class="w-full flex-grow flex flex-col justify-center items-center">
        
        <!-- Contenedor del Banner Artístico -->
        <div class="w-full relative group">
            
            <!-- NOTA PARA DESARROLLADOR: 
                 Si tienes una imagen real lista, simplemente descomenta la etiqueta <img> de abajo 
                 y reemplaza "image_082b3f.jpg" con tu archivo. Mientras tanto, se renderizará el mockup dinámico en alta definición. -->
            
            <!--
            <img src="image_082b3f.jpg" alt="UMBRA Grimorium of Morpheus" class="w-full object-cover max-h-[480px] select-none block" onerror="this.style.display='none'">
            -->

            <!-- MOCKUP NATIVO DE ALTA FIDELIDAD (REEMPLAZO SVG/CSS) -->
            <div class="w-full h-[320px] md:h-[420px] bg-[#0c0d12] relative overflow-hidden flex items-center justify-center border-y border-slate-900">
                <!-- Capa de Fondo Ambiental de Cueva Oscura -->
                <div class="absolute inset-0 opacity-40 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-indigo-950 via-slate-950 to-black"></div>
                
                <!-- Destellos Mágicos Flotantes -->
                <div class="absolute top-1/4 left-1/3 w-72 h-72 rounded-full bg-orange-600/10 blur-3xl animate-pulse"></div>
                <div class="absolute bottom-1/4 right-1/3 w-80 h-80 rounded-full bg-cyan-600/10 blur-3xl animate-pulse" style="animation-delay: 2s;"></div>

                <div class="max-w-7xl mx-auto w-full h-full px-6 flex items-center justify-between relative z-10">
                    
                    <!-- Mago Oscuro Izquierda -->
                    <div class="hidden md:flex flex-col items-center opacity-70 hover:opacity-100 transition-opacity duration-500">
                        <svg class="w-32 h-64 glow-red" viewBox="0 0 100 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <!-- Silueta Capucha y Túnica -->
                            <path d="M50 20 L30 50 L20 120 L15 190 L85 190 L80 120 L70 50 Z" fill="#11131a" />
                            <!-- Hombros y capa externa -->
                            <path d="M50 25 L25 55 L35 120 L25 180 L75 180 L65 120 L75 55 Z" fill="#08090d" />
                            <!-- Ojos Brillantes del Mago -->
                            <circle cx="43" cy="45" r="2.5" fill="#ef4444" />
                            <circle cx="57" cy="45" r="2.5" fill="#ef4444" />
                            <!-- Detalles de runas oscuras -->
                            <path d="M40 70 L60 70 M45 90 L55 90 M48 110 L52 110" stroke="#ef4444" stroke-width="1.5" opacity="0.7" />
                        </svg>
                    </div>

                    <!-- ELEMENTO CENTRAL 1: Esfera Solar de Fuego -->
                    <div class="relative w-40 h-40 sm:w-56 sm:h-56 lg:w-64 lg:h-64 flex-shrink-0 flex items-center justify-center">
                        <div class="absolute inset-0 bg-gradient-to-r from-amber-500 via-orange-600 to-red-600 rounded-full glow-red animate-spin" style="animation-duration: 20s;"></div>
                        <!-- Núcleo de la Esfera de Fuego -->
                        <div class="w-[90%] h-[90%] rounded-full bg-[#050608] flex items-center justify-center overflow-hidden relative">
                            <!-- Textura interna de lava -->
                            <div class="absolute inset-0 opacity-80 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-yellow-300 via-orange-600 to-transparent"></div>
                            <!-- Lenguas de fuego nativas -->
                            <svg class="w-full h-full text-amber-400 opacity-60 animate-pulse" viewBox="0 0 100 100" fill="currentColor">
                                <path d="M50 15 C40 30 20 40 35 65 C45 80 55 80 65 65 C80 40 60 30 50 15 Z" />
                                <path d="M40 25 C35 35 25 45 35 60 C40 70 50 70 55 60 C65 45 50 35 40 25 Z" opacity="0.8" />
                            </svg>
                        </div>
                    </div>

                    <!-- ELEMENTO CENTRAL 2: Orbes Mágicos y el Orbe Gato Cyan -->
                    <div class="relative flex items-center gap-4 sm:gap-8">
                        
                        <!-- Orbe Violeta Pequeño Izquierdo -->
                        <div class="w-16 h-16 sm:w-24 sm:h-24 rounded-full bg-gradient-to-tr from-fuchsia-600 to-pink-500 glow-magenta flex items-center justify-center transform hover:scale-110 transition-transform">
                            <div class="w-[85%] h-[85%] rounded-full bg-slate-950/40 backdrop-blur-sm border border-fuchsia-400/30"></div>
                        </div>

                        <!-- Orbe Principal: El Gato Cyan -->
                        <div class="relative w-32 h-32 sm:w-44 sm:h-44 lg:w-48 lg:h-48 flex-shrink-0">
                            <!-- Resplandor de fondo -->
                            <div class="absolute inset-0 rounded-full bg-cyan-500/20 glow-cyan animate-pulse"></div>
                            
                            <!-- Orbe de Gato SVG Nativo -->
                            <svg class="w-full h-full drop-shadow-lg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <defs>
                                    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" stop-color="#22d3ee" />
                                        <stop offset="50%" stop-color="#0ea5e9" />
                                        <stop offset="100%" stop-color="#d946ef" />
                                    </linearGradient>
                                </defs>
                                
                                <!-- Orejas del Gato de Cristal -->
                                <path d="M60 70 L40 25 L85 45 Z" fill="url(#cyanGrad)" />
                                <path d="M140 70 L160 25 L115 45 Z" fill="url(#cyanGrad)" />
                                
                                <!-- Cuerpo de Esfera Principal -->
                                <circle cx="100" cy="110" r="65" fill="url(#cyanGrad)" />
                                
                                <!-- Contorno de Cristal Interno -->
                                <circle cx="100" cy="110" r="55" fill="#090d16" opacity="0.3" />
                                
                                <!-- Runa central blanca (Símbolo Y / Tridente de Umbra) -->
                                <path d="M100 150 L100 100 M100 100 L70 70 M100 100 L130 70 M100 70 L100 100" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" class="opacity-95" />
                                <circle cx="100" cy="100" r="6" fill="white" />
                                
                                <!-- Brillo de Cristal Superior -->
                                <ellipse cx="100" cy="65" rx="30" ry="10" fill="white" opacity="0.15" />
                            </svg>
                        </div>
                    </div>

                    <!-- Mago Oscuro Derecha con Runa Roja -->
                    <div class="hidden md:flex flex-col items-center opacity-70 hover:opacity-100 transition-opacity duration-500">
                        <svg class="w-32 h-64 glow-red" viewBox="0 0 100 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <!-- Silueta Capucha y Túnica -->
                            <path d="M50 20 L30 50 L20 120 L15 190 L85 190 L80 120 L70 50 Z" fill="#11131a" />
                            <!-- Detalles Capa -->
                            <path d="M50 25 L25 55 L35 120 L25 180 L75 180 L65 120 L75 55 Z" fill="#08090d" />
                            <!-- Máscara u Ojos brillantes -->
                            <path d="M40 45 L50 35 L60 45 L50 55 Z" fill="#ef4444" opacity="0.8" />
                            <!-- Manos conjurando círculo mágico -->
                            <circle cx="50" cy="130" r="15" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 2" />
                            <circle cx="50" cy="130" r="5" fill="#ef4444" />
                        </svg>
                    </div>

                </div>
            </div>

        </div>

        <!-- SECCIÓN DE AGRADECIMIENTO ADICIONAL / EXPLORAR OTROS MUNDOS (IDÉNTICO A LA REFERENCIA) -->
        <section class="w-full purple-gradient py-12 relative overflow-hidden border-t border-purple-500/30">
            <!-- Destello de fondo diagonal -->
            <div class="absolute inset-0 bg-[linear-gradient(45deg,transparent_25%,rgba(255,255,255,0.05)_50%,transparent_75%)] bg-[length:250px_250px] animate-pulse"></div>
            
            <div class="max-w-7xl mx-auto px-6 text-center">
                <!-- Título: EXPLORA OTROS MUNDOS -->
                <h3 class="text-3xl sm:text-4xl md:text-5xl font-black tracking-widest font-orbitron text-white">
                    EXPLORA OTROS MUNDOS
                </h3>
                <!-- Subtítulo: Dale no seas cagón, estos juegos están buenísimos -->
                <p class="text-sm sm:text-base md:text-lg text-purple-200 mt-2 font-medium tracking-wide">
                    Dale no seas cagón, estos juegos están buenísimos
                </p>
                
                <!-- Retorno Rápido / CTA del Portafolio -->
                <div class="mt-8 flex justify-center">
                    <a href="index.html" class="inline-flex items-center justify-center px-8 py-3 border border-transparent text-base font-bold rounded-xl text-white bg-brand-600 hover:bg-brand-700 shadow-xl shadow-brand-500/20 hover:scale-105 transition-all transform duration-300">
                        <i data-lucide="compass" class="mr-2 w-5 h-5"></i>
                        Volver a Portafolio Franco
                    </a>
                </div>
            </div>
        </section>

    </main>

    <!-- FOOTER MÍNIMO DE ESTILO GAMER -->
    <footer class="bg-gameDarker border-t border-slate-900/40 py-6 text-center text-xs text-slate-500">
        <div class="max-w-7xl mx-auto px-4">
            <p class="font-orbitron tracking-wider text-slate-400">© 2026 GRIMORIUM OF MORPHEUS. DESARROLLADO POR FRANCO RODRÍGUEZ.</p>
        </div>
    </footer>

    <!-- LÓGICA DE ICONOS -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
